{% extends "base.html" %}

{% block title %}Login - NUTRIEPS{% endblock %}

{% block content %}
<div class="auth-page-container">
    <div class="auth-box">
        <h1 class="auth-heading">Login</h1>

        {% if form.errors %}
        <div class="error-message">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" class="custom-auth-form">
            {% csrf_token %}

            <div class="input-wrapper">
                <label for="id_username" class="input-label">Username:</label>
                {{ form.username }}
            </div>

            <div class="input-wrapper">
                <label for="id_password" class="input-label">Password:</label>
                {{ form.password }}
            </div>

            <button type="submit" class="submit-btn orange-btn">Login</button>
        </form>

        <p class="auth-footer-text">Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
    </div>
</div>
{% endblock %}
