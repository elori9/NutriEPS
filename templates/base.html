<!-- templates/base.html -->

{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NUTRIEPS{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'nutrieps/style.css' %}">
</head>
<body>

        <a href="{% url 'nutrieps:home' %}">Home</a>

        <p>Django NUTRIEPS - 2026</p>
    </footer>

</html>
