<!-- templates/base.html -->

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NUTRIEPS{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'nutrieps/style.css' %}?v">
    <link rel="icon" href="{% static 'nutrieps/images/logo.png' %}" type="image/png">

</head>
    <header class="site-header">
        <div class="header-inner">
            <a href="{% url 'nutrieps:home' %}" class="logo">NUTRI<span class="eps-color">EPS</span></a>

            <nav class="main-nav">
                <a href="{% url 'nutrieps:home' %}" class="nav-link">Home</a>
                <a href="{% url 'nutrieps:search' %}" class="nav-link">Search</a>
                <a href="{% url 'nutrieps:history' %}" class="nav-link">History</a>
                <a href="{% url 'nutrieps:profile' %}" class="profile-btn">Profile</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 NUTRIEPS. Track your fitness goals.</p>
        </div>
    </footer>

</body>
</html>
