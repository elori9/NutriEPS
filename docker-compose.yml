services:
  web:
    build: .

    ports:
      - "8000:8000"

    # Mount the current directory into /app in the container
    volumes:
      - .:/app

    depends_on:
      - db

    env_file:
      - vars.env


  db:
    image: postgres:17-alpine

    env_file:
      - vars.env

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5432:5432"


volumes:
  pgdata: